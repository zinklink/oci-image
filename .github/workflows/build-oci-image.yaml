name: OCI Image Build

    # ── 1️⃣ 觸發條件 ────────────────────────────────────────
    #   - 任何分支的 push，只要檔案路徑符合 Dockerfile
    #   - PR 合併（或更新）時也會觸發，確保 PR 內的 Dockerfile 變更不會被遺漏
    #   - 手動觸發 (workflow_dispatch) 為備用


on:
  push:
    paths:
      - Dockerfile          # 只在 Dockerfile 被改動時觸發
  pull_request:
    paths:
      - Dockerfile
  workflow_dispatch:        # 手動觸發備用

# ── 2️⃣ 工作內容 ────────────────────────────────────────

jobs:
  build-and-push:
    runs-on: ubuntu-latest         # GitHub‑Hosted runner
    steps:
      # ---------------------------------------------------
      # ① 取回原始碼
      # ---------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v5   # 已支援 Node 24
      # ---------------------------------------------------
      # ② 設定 Buildx（支援多平台、快取等可選功能）
      # ---------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      
      - name: Build and push OCI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: my-app:test
      - name: save image to tar file
        run: docker save -o my-app.tar my-app:ci-build

      - name: Upload artifact (download later)
        uses: actions/upload-artifact@v4
        with:
          name: built-image
          path: my-app.tar